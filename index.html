<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economic Indicators Dashboard | 經濟指標儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0c10;
  --bg-secondary: #12151c;
  --bg-card: #181c26;
  --bg-card-hover: #1e2330;
  --bg-modal: #141821;
  --border: #2a2f3e;
  --border-hover: #3d4460;
  --text-primary: #e8eaf0;
  --text-secondary: #8b90a0;
  --text-muted: #5c6175;
  --accent-leading: #00d4aa;
  --accent-leading-dim: rgba(0,212,170,0.12);
  --accent-lagging: #ff6b6b;
  --accent-lagging-dim: rgba(255,107,107,0.12);
  --accent-coincident: #4ea8ff;
  --accent-coincident-dim: rgba(78,168,255,0.12);
  --accent-gold: #f0c040;
  --accent-gold-dim: rgba(240,192,64,0.12);
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Header */
.ei-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,12,16,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; justify-content: center; align-items: center;
}

.ei-header-center { display: flex; align-items: center; flex-direction: column; gap: 6px; }

.ei-header-title-row { display: flex; align-items: center; gap: 12px; }

.ei-logo {
  font-size: 11px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent-gold);
  border: 1px solid var(--accent-gold);
  padding: 4px 10px; border-radius: 4px;
}

.ei-header-title {
  font-size: 24px; font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.5px;
}

.ei-header-subtitle {
  font-size: 12px; color: var(--text-muted);
  letter-spacing: 1px; text-align: center;
}

.ei-header-controls {
  position: absolute; right: 32px; top: 50%;
  transform: translateY(-50%);
  display: flex; align-items: center; gap: 12px;
}

.ei-lang-toggle {
  display: flex; background: var(--bg-secondary);
  border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}

.ei-lang-btn {
  padding: 6px 16px; font-size: 13px; font-weight: 500;
  border: none; cursor: pointer;
  background: transparent; color: var(--text-secondary);
  font-family: inherit; transition: all 0.2s;
}

.ei-lang-btn.ei-active {
  background: var(--accent-gold);
  color: #0a0c10; font-weight: 700;
}

.ei-filter-bar-wrap {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}

.ei-filter-bar {
  display: flex; gap: 8px; padding: 12px 32px;
  flex-wrap: wrap;
  max-width: 1440px; margin: 0 auto;
}

.ei-filter-btn {
  padding: 6px 16px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); border-radius: 20px;
  background: transparent; color: var(--text-secondary);
  cursor: pointer; font-family: inherit; transition: all 0.2s;
  letter-spacing: 0.5px;
}

.ei-filter-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
.ei-filter-btn.ei-active-all { border-color: var(--accent-gold); color: var(--accent-gold); background: var(--accent-gold-dim); }
.ei-filter-btn.ei-active-leading { border-color: var(--accent-leading); color: var(--accent-leading); background: var(--accent-leading-dim); }
.ei-filter-btn.ei-active-lagging { border-color: var(--accent-lagging); color: var(--accent-lagging); background: var(--accent-lagging-dim); }
.ei-filter-btn.ei-active-coincident { border-color: var(--accent-coincident); color: var(--accent-coincident); background: var(--accent-coincident-dim); }

.ei-search-wrap {
  margin-left: auto;
  position: relative;
  display: flex; align-items: center;
}

.ei-search-box {
  padding: 6px 32px 6px 14px; font-size: 13px;
  border: 1px solid var(--border); border-radius: 20px;
  background: var(--bg-primary); color: var(--text-primary);
  font-family: inherit; width: 220px; outline: none;
  transition: border-color 0.2s;
}
.ei-search-box.ei-has-tag {
  border-color: var(--accent-gold);
  color: var(--accent-gold);
}
.ei-search-box:focus { border-color: var(--accent-gold); }
.ei-search-box::placeholder { color: var(--text-muted); }

.ei-search-clear {
  position: absolute; right: 8px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--border);
  border: none;
  color: var(--text-primary);
  font-size: 12px; line-height: 1;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  transition: background 0.2s;
}
.ei-search-clear.ei-visible { display: flex; }
.ei-search-clear:hover { background: var(--accent-lagging); }

/* Legend */
.ei-legend-wrap {
  border-bottom: 1px solid var(--border);
}

.ei-legend {
  display: flex; gap: 24px; padding: 16px 32px;
  align-items: center; flex-wrap: wrap;
  max-width: 1440px; margin: 0 auto;
}

.ei-legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary);
}

.ei-legend-dot {
  width: 10px; height: 10px; border-radius: 50%;
}

.ei-legend-dot.ei-leading { background: var(--accent-leading); }
.ei-legend-dot.ei-lagging { background: var(--accent-lagging); }
.ei-legend-dot.ei-coincident { background: var(--accent-coincident); }

/* Main Grid */
.ei-main { padding: 0 32px 64px; max-width: 1440px; margin: 0 auto; }

.ei-section-title {
  font-size: 14px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  margin: 32px 0 16px;
  display: flex; align-items: center; gap: 12px;
}

.ei-section-title .ei-line {
  flex: 1; height: 1px; background: var(--border);
}

.ei-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

/* Card */
.ei-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.ei-card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 4px; height: 100%;
  border-radius: 4px 0 0 4px;
}

.ei-card.ei-leading::before { background: var(--accent-leading); }
.ei-card.ei-lagging::before { background: var(--accent-lagging); }
.ei-card.ei-coincident::before { background: var(--accent-coincident); }

.ei-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.ei-card-header {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 8px;
}

.ei-card-name {
  font-size: 15px; font-weight: 700;
  line-height: 1.3;
}

.ei-card-abbr {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500;
  padding: 2px 8px; border-radius: 4px;
  white-space: nowrap;
}

.ei-card.ei-leading .ei-card-abbr { color: var(--accent-leading); background: var(--accent-leading-dim); }
.ei-card.ei-lagging .ei-card-abbr { color: var(--accent-lagging); background: var(--accent-lagging-dim); }
.ei-card.ei-coincident .ei-card-abbr { color: var(--accent-coincident); background: var(--accent-coincident-dim); }

.ei-card-type {
  font-size: 11px; font-weight: 500;
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 8px;
}

.ei-card.ei-leading .ei-card-type { color: var(--accent-leading); }
.ei-card.ei-lagging .ei-card-type { color: var(--accent-lagging); }
.ei-card.ei-coincident .ei-card-type { color: var(--accent-coincident); }

.ei-card-desc {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

.ei-card-footer {
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between;
  align-items: center;
  font-size: 11px;
}

.ei-card-freq {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500;
  color: var(--text-primary);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 10px;
  letter-spacing: 0.3px;
  line-height: 1.4;
  text-align: center;
}

.ei-card-click-hint {
  font-size: 11px; color: var(--text-muted);
  opacity: 0; transition: opacity 0.2s;
}
.ei-card:hover .ei-card-click-hint { opacity: 1; }

/* Modal Overlay */
.ei-modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 1000;
  justify-content: center; align-items: flex-start;
  padding: 40px 20px;
  overflow-y: auto;
}

.ei-modal-overlay.ei-active { display: flex; }

.ei-modal {
  background: var(--bg-modal);
  border: 1px solid var(--border);
  border-radius: 14px;
  max-width: 780px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: modalIn 0.3s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.ei-modal-header {
  padding: 24px 28px 16px;
  border-bottom: 1px solid var(--border);
}

.ei-modal-title-group { padding-right: 48px; }
.ei-modal-name { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.ei-modal-name-sub { font-size: 15px; color: var(--text-secondary); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.ei-modal-badge {
  font-size: 12px; font-weight: 600;
  padding: 3px 12px; border-radius: 20px;
  letter-spacing: 0.5px;
  display: inline-flex; align-items: center;
}

.ei-modal-badge.ei-leading { color: var(--accent-leading); background: var(--accent-leading-dim); border: 1px solid rgba(0,212,170,0.3); }
.ei-modal-badge.ei-lagging { color: var(--accent-lagging); background: var(--accent-lagging-dim); border: 1px solid rgba(255,107,107,0.3); }
.ei-modal-badge.ei-coincident { color: var(--accent-coincident); background: var(--accent-coincident-dim); border: 1px solid rgba(78,168,255,0.3); }

.ei-modal-close {
  position: absolute; top: 16px; right: 20px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 18px;
  width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.ei-modal-close:hover { color: var(--text-primary); border-color: var(--border-hover); }

.ei-modal-body { padding: 24px 28px 28px; }

.ei-modal-section {
  margin-bottom: 24px;
}

.ei-modal-section:last-child { margin-bottom: 0; }

.ei-modal-section-title {
  font-size: 12px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent-gold);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}

.ei-modal-section-title .ei-icon { font-size: 14px; }

.ei-modal-text {
  font-size: 15px; color: var(--text-primary);
  line-height: 1.8;
}

.ei-modal-formula {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  color: var(--accent-gold);
  line-height: 1.8;
  overflow-x: auto;
}

.ei-modal-source {
  font-size: 14px; color: var(--text-primary);
}

.ei-modal-source a {
  color: var(--accent-gold);
  text-decoration: none;
}

.ei-regime-note {
  font-size: 13px; line-height: 1.6;
  color: var(--accent-gold);
  background: var(--accent-gold-dim);
  border: 1px solid rgba(240,192,64,0.25);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 14px;
}

.ei-impact-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.ei-impact-box {
  padding: 16px 18px;
  border-radius: 8px;
  font-size: 14px; line-height: 1.7;
}

.ei-impact-box.ei-bullish {
  background: rgba(0,212,170,0.08);
  border: 1px solid rgba(0,212,170,0.2);
}

.ei-impact-box.ei-bearish {
  background: rgba(255,107,107,0.08);
  border: 1px solid rgba(255,107,107,0.2);
}

.ei-impact-label {
  font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 8px;
}

.ei-impact-box.ei-bullish .ei-impact-label { color: var(--accent-leading); }
.ei-impact-box.ei-bearish .ei-impact-label { color: var(--accent-lagging); }

.ei-impact-text { color: var(--text-primary); }

.ei-modal-tags {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;
}

.ei-modal-tag {
  font-size: 12px; padding: 4px 12px;
  border-radius: 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.ei-modal-tag:hover {
  border-color: var(--accent-gold);
  color: var(--accent-gold);
  background: var(--accent-gold-dim);
}

/* Footer */
.ei-footer {
  text-align: center; padding: 24px;
  font-size: 12px; color: var(--text-muted);
  border-top: 1px solid var(--border);
}

/* Responsive */
@media (max-width: 768px) {
  .ei-header { padding: 12px 16px; flex-direction: column; gap: 8px; }
  .ei-header-controls { position: static; transform: none; }
  .ei-header-title { font-size: 18px; }
  .ei-filter-bar { padding: 10px 16px; }
  .ei-main { padding: 0 16px 48px; }
  .ei-grid { grid-template-columns: 1fr; }
  .ei-impact-grid { grid-template-columns: 1fr; }
  .ei-modal { margin: 20px; }
  .ei-search-wrap { width: 100%; margin-left: 0; margin-top: 8px; }
  .ei-search-box { width: 100%; }
}
</style>
</head>
<body>

<div class="ei-header">
  <div class="ei-header-center">
    <div class="ei-header-title-row">
      <div class="ei-logo">ECON</div>
      <div class="ei-header-title" id="headerTitle">Economic Indicators Dashboard</div>
    </div>
    <div class="ei-header-subtitle" id="headerSubtitle">CLICK ANY INDICATOR FOR FULL DETAILS</div>
  </div>
  <div class="ei-header-controls">
    <div class="ei-lang-toggle">
      <button class="ei-lang-btn ei-active" onclick="setEconLang('en', this)">EN</button>
      <button class="ei-lang-btn" onclick="setEconLang('zh', this)">繁中</button>
    </div>
  </div>
</div>

<div class="ei-filter-bar-wrap">
  <div class="ei-filter-bar" id="filterBar"></div>
</div>

<div class="ei-legend-wrap">

    <div class="ei-legend-item"><div class="ei-legend-dot ei-leading"></div><span id="legLeading">Leading</span></div>

  </div>
</div>

<div class="ei-main" id="mainContent"></div>

<div class="ei-modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeEconModal()">
  <div class="ei-modal" id="modalContent"></div>
</div>

<div class="ei-footer" id="footer">Data references: Bureau of Economic Analysis (BEA), Bureau of Labor Statistics (BLS), Federal Reserve, ISM, Conference Board, Census Bureau</div>

    footer: 'Data references: Bureau of Economic Analysis (BEA), Bureau of Labor Statistics (BLS), Federal Reserve, ISM, Conference Board, Census Bureau',
    clickHint: 'Click for details →',
    sectionLeading: '🟢 Leading Indicators — Predict Future Activity',
    sectionCoincident: '🔵 Coincident Indicators — Reflect Current Conditions',
    sectionLagging: '🔴 Lagging Indicators — Confirm Past Trends'
  },
  zh: {
    title: '📊 經濟指標儀表板',
    subtitle: '點擊任意指標查看完整詳情',
    all: '所有指標',
    leading: '領先指標',
    lagging: '滯後指標',
    coincident: '同步指標',
    search: '搜尋指標...',
    definition: '定義',
    formula: '公式 / 計算方法',
    theory: '經濟理論',
    source: '數據來源',
    frequency: '發佈頻率',
    marketImpact: '股市影響',
    regimeNote: '⚠️ 宏觀體制至關重要：數據本身無絕對利多或利空 — 解讀取決於當前經濟週期。在加息/通膨週期中，強勁數據 =「好消息就是壞消息」（鷹派）。在衰退擔憂週期中，疲軟數據 =「壞消息就是壞消息」（真正的避險）。反應前務必先識別當前的宏觀體制。',
    aboveLabel: '▲ 高於預期',
    belowLabel: '▼ 低於預期',
    relatedTags: '相關標籤 — 點擊篩選',
    footer: '數據參考：經濟分析局（BEA）、勞工統計局（BLS）、聯邦儲備、ISM、世界大型企業聯合會、人口普查局',
    clickHint: '點擊查看詳情 →',
    sectionLeading: '🟢 領先指標 — 預測未來經濟活動',
    sectionCoincident: '🔵 同步指標 — 反映當前經濟狀況',
    sectionLagging: '🔴 滯後指標 — 確認過去趨勢'
  }
};

function setEconLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.ei-lang-btn').forEach(b => b.classList.remove('ei-active'));
  btn.classList.add('ei-active');
  updateEconUI();
}

function setEconFilter(type) {
  currentFilter = type;
  updateEconUI();
}

function formatFreq(freq) {
  if (!freq) return '';
  // Insert <br> before parenthetical so it wraps cleanly
  return freq.replace(/\s*(\()/g, '<br>$1');
}

function updateEconUI() {
  const t = uiText[currentLang];
  
  // Header
  document.getElementById('headerTitle').textContent = t.title;
  document.getElementById('headerSubtitle').textContent = t.subtitle;
  
    // Legend
  document.getElementById('legLeading').textContent = t.leading;
  document.getElementById('legCoincident').textContent = t.coincident;
  document.getElementById('legLagging').textContent = t.lagging;
  
  // Footer
  document.getElementById('footer').textContent = t.footer;
  
  // Filter bar
  const filterBar = document.getElementById('filterBar');
  filterBar.innerHTML = `
    <button class="ei-filter-btn ${currentFilter === 'all' ? 'ei-active-all' : ''}" onclick="setEconFilter('all')">${t.all} (${indicators.length})</button>
    <button class="ei-filter-btn ${currentFilter === 'leading' ? 'ei-active-leading' : ''}" onclick="setEconFilter('leading')">${t.leading} (${indicators.filter(i=>i.type==='leading').length})</button>
    <button class="ei-filter-btn ${currentFilter === 'coincident' ? 'ei-active-coincident' : ''}" onclick="setEconFilter('coincident')">${t.coincident} (${indicators.filter(i=>i.type==='coincident').length})</button>
    <button class="ei-filter-btn ${currentFilter === 'lagging' ? 'ei-active-lagging' : ''}" onclick="setEconFilter('lagging')">${t.lagging} (${indicators.filter(i=>i.type==='lagging').length})</button>
    <div class="ei-search-wrap">
      <input class="ei-search-box ${searchTerm ? 'ei-has-tag' : ''}" type="text" placeholder="${t.search}" value="${searchTerm}" oninput="searchTerm=this.value;drawEconCards();" />
      <button class="ei-search-clear ${searchTerm ? 'ei-visible' : ''}" onclick="searchTerm='';updateEconUI();" title="Clear">✕</button>
    </div>
  `;
  
  drawEconCards();
}

function drawEconCards() {
  const t = uiText[currentLang];
  const main = document.getElementById('mainContent');
  
  let filtered = indicators;
  if (currentFilter !== 'all') filtered = filtered.filter(i => i.type === currentFilter);
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(i => {
      const d = i[currentLang];
      return d.name.toLowerCase().includes(s) || d.abbr.toLowerCase().includes(s) || 
             d.category.toLowerCase().includes(s) || d.shortDesc.toLowerCase().includes(s) ||
             d.tags.some(tag => tag.toLowerCase().includes(s));
    });
  }
  
  const groups = [
    { type: 'leading', title: t.sectionLeading },
    { type: 'coincident', title: t.sectionCoincident },
    { type: 'lagging', title: t.sectionLagging }
  ];
  
  let html = '';
  groups.forEach(g => {
    const items = filtered.filter(i => i.type === g.type);
    if (items.length === 0) return;
    
    html += `<div class="ei-section-title"><span>${g.title}</span><span class="ei-line"></span></div>`;
    html += '<div class="ei-grid">';
    items.forEach(item => {
      const d = item[currentLang];
      const typeLabel = currentLang === 'en' ? 
        (item.type === 'leading' ? 'LEADING' : item.type === 'lagging' ? 'LAGGING' : 'COINCIDENT') :
        (item.type === 'leading' ? '領先' : item.type === 'lagging' ? '滯後' : '同步');
      
      const catIcons = {
        'Business Activity': '🏭', '商業活動': '🏭',
        'Consumer Sentiment': '🧠', '消費者情緒': '🧠',
        'Housing': '🏠', '住房': '🏠',
        'Financial Markets': '📈', '金融市場': '📈',
        'Labor Market': '👷', '勞動市場': '👷',
        'Composite': '🧩', '綜合指標': '🧩',
        'Output & Growth': '📊', '產出與增長': '📊',
        'Inflation': '🔥', '通膨': '🔥',
        'Consumer Spending': '🛒', '消費者支出': '🛒',
        'Monetary Policy': '🏛️', '貨幣政策': '🏛️',
        'International': '🌐', '國際': '🌐',
        'Financial Conditions': '💳', '金融條件': '💳',
        'Business Investment': '⚙️', '企業投資': '⚙️',
        'Monetary & Liquidity': '💰', '貨幣與流動性': '💰'
      };
      const icon = catIcons[d.category] || '📋';
      


      html += `
        <div class="ei-card ei-${item.type}" onclick="openEconModal('${item.id}')">
          <div class="ei-card-header">
            <div class="ei-card-name">${icon} ${d.name}</div>
            <span class="ei-card-abbr">${d.abbr}</span>
          </div>
          <div class="ei-card-type">${typeLabel} · ${d.category}</div>
          <div class="ei-card-desc">${d.shortDesc}</div>
          <div class="ei-card-footer">
            <span class="ei-card-freq">${formatFreq(d.frequency)}</span>
            <span class="ei-card-click-hint">${t.clickHint}</span>
          </div>
        </div>
      `;
    });
    html += '</div>';
  });
  
  main.innerHTML = html;
}

function openEconModal(id) {
  const item = indicators.find(i => i.id === id);
  if (!item) return;
  
  const d = item[currentLang];
  const t = uiText[currentLang];
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="ei-modal-header" style="position:relative;">
      <div class="ei-modal-title-group">
        <div class="ei-modal-name">${d.name}</div>
        <div class="ei-modal-name-sub">${d.abbr} · ${d.category} <span class="ei-modal-badge ei-${item.type}">${item.type === 'leading' ? (currentLang==='en'?'Leading':'領先') : item.type === 'lagging' ? (currentLang==='en'?'Lagging':'滯後') : (currentLang==='en'?'Coincident':'同步')}</span></div>
      </div>
      <button class="ei-modal-close" onclick="closeEconModal()" title="Close">✕</button>
    </div>
    <div class="ei-modal-body">
      <div class="ei-modal-section">
        <div class="ei-modal-section-title"><span class="ei-icon">📖</span> ${t.definition}</div>
        <div class="ei-modal-text">${d.definition}</div>
      </div>
      
      <div class="ei-modal-section">
        <div class="ei-modal-section-title"><span class="ei-icon">🔢</span> ${t.formula}</div>
        <div class="ei-modal-formula">${d.formula.replace(/\n/g, '<br>')}</div>
      </div>
      
      <div class="ei-modal-section">
        <div class="ei-modal-section-title"><span class="ei-icon">🎓</span> ${t.theory}</div>
        <div class="ei-modal-text">${d.theory}</div>
      </div>
      
      <div class="ei-modal-section">
        <div class="ei-modal-section-title"><span class="ei-icon">📡</span> ${t.source}</div>
        <div class="ei-modal-source">${d.source}</div>
        <div style="margin-top:6px;font-size:13px;color:var(--text-secondary);">${t.frequency}: ${d.frequency}</div>
      </div>
      
      <div class="ei-modal-section">
        <div class="ei-modal-section-title"><span class="ei-icon">📊</span> ${t.marketImpact}</div>
        <div class="ei-regime-note">${t.regimeNote}</div>
        <div class="ei-impact-grid">
          <div class="ei-impact-box ei-bullish">
            <div class="ei-impact-label">${t.aboveLabel}</div>
            <div class="ei-impact-text">${d.aboveEst}</div>
          </div>
          <div class="ei-impact-box ei-bearish">
            <div class="ei-impact-label">${t.belowLabel}</div>
            <div class="ei-impact-text">${d.belowEst}</div>
          </div>
        </div>
      </div>
      
      <div class="ei-modal-section">
        <div class="ei-modal-section-title"><span class="ei-icon">🏷️</span> ${t.relatedTags}</div>
        <div class="ei-modal-tags">${d.tags.map(tag => `<span class="ei-modal-tag" onclick="filterEconByTag('${tag}')" title="${currentLang === 'en' ? 'Click to filter' : '點擊篩選'}">${tag}</span>`).join('')}</div>
      </div>
    </div>
  `;
  
  document.getElementById('modalOverlay').classList.add('ei-active');
}

function closeEconModal() {
  document.getElementById('modalOverlay').classList.remove('ei-active');
}

function filterEconByTag(tag) {
  closeEconModal();
  // Set search to tag, reset filter to all
  searchTerm = tag;
  currentFilter = 'all';
  updateEconUI();
  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeEconModal();
  }
});

// Initial render
updateEconUI();

</script>
</body>
</html>
